name: Compilar APK con Buildozer

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Descargar el codigo del repositorio
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar dependencias del sistema de Linux
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libssl-dev libffi-dev libgdbm-dev libsqlite3-dev libbz2-dev liblzma-dev tk-dev libdb-dev readline-common

    - name: Instalar Buildozer y Cython
      run: |
        pip install --user --upgrade buildozer cython virtualenv

    - name: Compilar APK con Buildozer
      run: |
        cd Contadores-master
        
        # Aceptar licencias de Android automáticamente para que no pida (y/N)
        mkdir -p ~/.android
        touch ~/.android/repositories.cfg
        
        # Si no existe buildozer.spec, lo inicializamos automáticamente
        if [ ! -f buildozer.spec ]; then
          ~/.local/bin/buildozer init
          sed -i 's/title = My Application/title = Flex Rex/g' buildozer.spec
          sed -i 's/requirements = python3,kivy/requirements = python3,kivy,opencv-python,mediapipe/g' buildozer.spec
          sed -i 's/#android.permissions = CAMERA/android.permissions = CAMERA/g' buildozer.spec
          # Forzar a Buildozer a aceptar licencias en modo no interactivo
          sed -i 's/#android.accept_sdk_license = False/android.accept_sdk_license = True/g' buildozer.spec
        else
          sed -i 's/android.accept_sdk_license = False/android.accept_sdk_license = True/g' buildozer.spec
          sed -i 's/#android.accept_sdk_license = False/android.accept_sdk_license = True/g' buildozer.spec
        fi
        
        # Ejecutar compilación respondiendo "sí" automáticamente a cualquier otra pregunta interna
        yes | ~/.local/bin/buildozer -v android debug

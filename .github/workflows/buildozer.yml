name: Compilar APK con Buildozer

on:
  push:
    branches: [ maestro ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Descargar el codigo del repositorio
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar dependencias del sistema de Linux
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libssl-dev libffi-dev libgdbm-dev libsqlite3-dev libbz2-dev liblzma-dev tk-dev libdb-dev readline-common

    - name: Instalar Buildozer y Cython
      run: |
        pip install --user --upgrade buildozer cython virtualenv

    - name: Compilar APK con Buildozer
      run: |
        cd Contadores-master
        
        # Pre-aceptar las licencias de Android SDK escribiendo el archivo directamente
        mkdir -p ~/.android
        touch ~/.android/repositories.cfg
        
        # Modificar parámetros en tu buildozer.spec para que use la arquitectura correcta
        if [ -f buildozer.spec ]; then
          sed -i 's/android.accept_sdk_license = False/android.accept_sdk_license = True/g' buildozer.spec
          sed -i 's/#android.accept_sdk_license = False/android.accept_sdk_license = True/g' buildozer.spec
          sed -i 's/android.archs = armeabi-v7a/android.archs = arm64-v8a/g' buildozer.spec
        fi
        
        # Ejecutar la compilación pasándole 'yes' de forma segura
        export ANDROID_WELCOME_SEEN=1
        ~/.local/bin/buildozer android debug

    - name: Guardar y subir el APK generado
      uses: actions/upload-artifact@v4
      with:
        name: Mi-App-Flex-Rex
        path: Contadores-master/.buildozer/android/platform/build-arm64-v8a/dists/flexrex/build/outputs/apk/debug/*.apk

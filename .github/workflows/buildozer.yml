name: Compilar APK con Buildozer

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar el codigo del repositorio
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Compilar con Buildozer
      uses: ArtemGovorov/buildozer-action@v1
      with:
        command: buildozer -v android debug
        repository_root: Contadores-master

    - name: Guardar y subir el APK generado
      uses: actions/upload-artifact@v4
      with:
        name: Mi-App-Flex-Rex
        path: Contadores-master/bin/*.apk

name: Build Android APK with Buildozer

on:
  push:
    branches:
      - master
      - maestro
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Java 17 Development Kit
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Set up Python environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Linux system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libssl-dev libffi-dev libgdbm-dev libsqlite3-dev libbz2-dev liblzma-dev tk-dev libdb-dev readline-common

    - name: Install Buildozer and Cython
      run: |
        pip install --user --upgrade buildozer cython virtualenv

    - name: Compile APK via Buildozer
      run: |
        cd .
        
        # 1. Configurar variables globales de entorno usando Java 17 nativo
        export JAVA_HOME=$JAVA_HOME_17_X64
        export PATH=$JAVA_HOME/bin:$PATH
        export ANDROID_WELCOME_SEEN=1
        
        # 2. Crear carpetas base de la arquitectura que Buildozer espera encontrar
        mkdir -p /home/runner/.buildozer/android/platform/android-sdk/tools/bin
        mkdir -p /home/runner/.buildozer/android/platform/android-sdk/licenses
        
        # 3. Enlazar el sdkmanager moderno del servidor a la ruta esperada por Buildozer
        ln -sf /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager /home/runner/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager
        
        # 4. Copiar e Inyectar las firmas y licencias aceptadas de Android
        echo -e "\n893a5cd8b1e647af1d152de3ab0df356dd4ffb43\n24333f1a50b3b83d6e24c993f043e844a30e4130\n84831b9409646a918e30573bab4c9c91346d8abd" > /home/runner/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
        echo -e "\n84831b9409646a918e30573bab4c9c91346d8abd" > /home/runner/.buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license
        
        # 5. Ajustar especificaciones del archivo buildozer.spec automáticamente
        if [ -f buildozer.spec ]; then
          sed -i 's/android.accept_sdk_license = False/android.accept_sdk_license = True/g' buildozer.spec
          sed -i 's/#android.accept_sdk_license = False/android.accept_sdk_license = True/g' buildozer.spec
          sed -i 's/android.archs = armeabi-v7a/android.archs = arm64-v8a/g' buildozer.spec
        fi
        
        # 6. Lanzar la compilación
        ~/.local/bin/buildozer android debug

    - name: Upload and save the generated APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: Flex-Rex-App
        path: Contadores-master/.buildozer/android/platform/build-arm64-v8a/dists/flexrex/build/outputs/apk/debug/*.apk

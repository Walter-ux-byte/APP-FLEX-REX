name: Compilar APK con Buildozer

on:
  push:
    branches: [ maestro ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Descargar el codigo del repositorio
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar dependencias del sistema de Linux
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libssl-dev libffi-dev libgdbm-dev libsqlite3-dev libbz2-dev liblzma-dev tk-dev libdb-dev readline-common

    - name: Instalar Buildozer y Cython
      run: |
        pip install --user --upgrade buildozer cython virtualenv

    - name: Compilar APK con Buildozer
      run: |
        cd Contadores-master
        
        # 1. Crear directorios del SDK de forma anticipada para inyectar licencias
        mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
        
        # 2. Inyectar directamente los hashes de las licencias aceptadas de Google
        echo -e "\n893a5cd8b1e647af1d152de3ab0df356dd4ffb43\n24333f1a50b3b83d6e24c993f043e844a30e4130\n84831b9409646a918e30573bab4c9c91346d8abd" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
        echo -e "\n84831b9409646a918e30573bab4c9c91346d8abd" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license
        
        # 3. Asegurar los parámetros correctos en el archivo spec
        if [ -f buildozer.spec ]; then
          sed -i 's/android.accept_sdk_license = False/android.accept_sdk_license = True/g' buildozer.spec
          sed -i 's/#android.accept_sdk_license = False/android.accept_sdk_license = True/g' buildozer.spec
          sed -i 's/android.archs = armeabi-v7a/android.archs = arm64-v8a/g' buildozer.spec
        fi
        
        # 4. Lanzar la compilación respondiendo automáticamente "sí" a cualquier extra
        yes | ~/.local/bin/buildozer android debug
